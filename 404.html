<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SCKBSVB1JW"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-SCKBSVB1JW');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Signal Lost | AdClamor Digital</title>
    <link rel="icon" type="image/png" href="admin/logo.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Outfit:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #03050a;
            --accent-blue: #326CF2;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-deep); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            overflow: hidden;
        }

        .container { max-width: 600px; padding: 40px; }
        
        .glitch-wrapper { position: relative; margin-bottom: 30px; }
        .error-code { 
            font-family: 'Outfit', sans-serif; 
            font-size: 8rem; 
            font-weight: 800; 
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        h1 { font-family: 'Outfit', sans-serif; font-size: 2rem; margin-bottom: 20px; }
        p { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; line-height: 1.6; }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 16px 32px;
            background: var(--accent-blue);
            color: #fff;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(50, 108, 242, 0.4);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(50, 108, 242, 0.5); }

        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(50, 108, 242, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(50px);
        }

        /* Ambient Animation */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }
        .bg-glow { animation: pulse 8s infinite ease-in-out; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="glitch-wrapper">
            <div class="error-code">404</div>
        </div>
        <h1>Signal Lost in the Noise</h1>
        <p>The digital coordinates you provided don't exist. We've likely moved this asset or it was never part of our architecture.</p>
        <a href="index.html" class="btn">Return to Base</a>
    </div>
</body>
</html>
